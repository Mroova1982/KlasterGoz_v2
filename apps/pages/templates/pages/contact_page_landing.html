{% extends "base.html" %}
{% load wagtailcore_tags %}
{% block body_attrs %}data-page="kontakt"{% endblock %}
{% block content %}

    <h1 style="margin-top: 16px;">Dziękujemy.</h1>

  </div>
</section>
{% endblock %}
